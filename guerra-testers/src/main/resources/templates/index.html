<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Módulo de Incidencias</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Chart.js -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

    <button class="btn btn-dark mb-3"
            onclick="cerrarSesion()">

        Cerrar Sesión

    </button>

    <button
    onclick="exportarPdf()"
    style="
        background:red;
        color:white;
        padding:10px;
        border:none;
        border-radius:5px;
        cursor:pointer;
        margin-bottom:20px;
    ">

        Exportar PDF
        

    </button>
    <a href="/historial"
        class="btn btn-secondary mb-3 ms-2">

        Ver Historial

    </a>
    <h1 class="text-center mb-4 text-primary">
        Módulo de Incidencias
    </h1>

    <div id="mensaje"></div>

    <!-- DASHBOARD -->

    <div class="row mt-4">

        <div class="col-md-3">

            <div class="card text-bg-primary">

                <div class="card-body">

                    <h5>Total</h5>

                    <h2 id="totalIncidencias">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-bg-danger">

                <div class="card-body">

                    <h5>Alta</h5>

                    <h2 id="totalAlta">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-bg-warning">

                <div class="card-body">

                    <h5>Media</h5>

                    <h2 id="totalMedia">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-bg-success">

                <div class="card-body">

                    <h5>Baja</h5>

                    <h2 id="totalBaja">0</h2>

                </div>

            </div>

        </div>

    </div>

    <!-- GRAFICO -->

    <div class="card mt-4">

        <div class="card-body">

            <h4 class="text-center">
                Estadísticas de Incidencias
            </h4>

            <canvas id="graficoIncidencias"></canvas>

        </div>

    </div>

    <!-- BUSCADOR -->

    <input type="text"
           id="busqueda"
           class="form-control mt-4"
           placeholder="Buscar por título">

    <button class="btn btn-secondary w-100 mt-2"
            onclick="buscarIncidencias()">

        Buscar

    </button>

    <!-- FILTRO -->

    <select id="filtroPrioridad"
            class="form-select mt-3">

        <option value="">
            Filtrar Prioridad
        </option>

        <option value="Alta">
            Alta
        </option>

        <option value="Media">
            Media
        </option>

        <option value="Baja">
            Baja
        </option>

    </select>

    <button class="btn btn-dark w-100 mt-2"
            onclick="filtrarPrioridad()">

        Filtrar

    </button>

    <!-- FORMULARIO -->

    <input type="hidden" id="idIncidencia">

    <input type="text"
           id="titulo"
           class="form-control mt-3"
           placeholder="Título">

    <input type="text"
           id="descripcion"
           class="form-control mt-3"
           placeholder="Descripción">

        <select id="prioridad"
            class="form-select mt-3">

        <option value="">
            Seleccionar Prioridad
        </option>

        <option value="Alta">
            Alta
        </option>

        <option value="Media">
            Media
        </option>

        <option value="Baja">
            Baja
        </option>

    </select>

    <select id="estado"
            class="form-select mt-3">

        <option value="">
            Seleccionar Estado
        </option>

        <option value="Pendiente">
            Pendiente
        </option>

        <option value="En Proceso">
            En Proceso
        </option>

        <option value="Resuelto">
            Resuelto
        </option>

        <option value="Cerrado">
            Cerrado
        </option>

    </select>

    <select id="sucursal"
            class="form-select mt-3">

        <option value="">
            Seleccionar Sucursal
        </option>

        <option value="Lima">
            Lima
        </option>

        <option value="Arequipa">
            Arequipa
        </option>

        <option value="Cusco">
            Cusco
        </option>

        <option value="Tacna">
            Tacna
        </option>

        <option value="Puno">
            Puno
        </option>

    </select>

    <input type="text"
           id="usuario"
           class="form-control mt-3"
           placeholder="Usuario">

    <button class="btn btn-primary w-100 mt-3"
            onclick="guardarOActualizar()">

        Guardar Incidencia

    </button>

    <!-- TABLA -->

    <table class="table table-bordered table-hover mt-4">

        <thead class="table-primary">

        <tr>

            <th>ID</th>

            <th>Título</th>

            <th>Descripción</th>

            <th>Prioridad</th>

            <th>Estado</th>

            <th>Sucursal</th>

            <th>Usuario</th>

            <th>Acciones</th>

        </tr>

        </thead>

        <tbody id="tablaIncidencias">

        </tbody>

    </table>

</div>

<script>

    const rol = localStorage.getItem("rol");

    if(!rol){

        window.location.href = "/login";

    }

    let grafico = null;

    async function listarIncidencias(){

        const response = await fetch(
            "http://localhost:8080/incidencias"
        );

        const data = await response.json();

        renderizarTabla(data);

    }

    async function buscarIncidencias(){

        const titulo =
            document.getElementById("busqueda").value;

        const response = await fetch(
            `http://localhost:8080/incidencias/buscar?titulo=${titulo}`
        );

        const data = await response.json();

        renderizarTabla(data);

    }

    async function filtrarPrioridad(){

        const prioridad =
            document.getElementById(
                "filtroPrioridad"
            ).value;

        if(prioridad == ""){

            listarIncidencias();

            return;

        }

        const response = await fetch(
            `http://localhost:8080/incidencias/prioridad?prioridad=${prioridad}`
        );

        const data = await response.json();

        renderizarTabla(data);

    }

    function renderizarTabla(data){

        let tabla =
            document.getElementById(
                "tablaIncidencias"
            );

        tabla.innerHTML = "";

        let altas = 0;

        let medias = 0;

        let bajas = 0;

        data.forEach(incidencia => {

            if(incidencia.prioridad == "Alta"){

                altas++;

            }

            if(incidencia.prioridad == "Media"){

                medias++;

            }

            if(incidencia.prioridad == "Baja"){

                bajas++;

            }

            tabla.innerHTML += `

                <tr>

                    <td>${incidencia.id}</td>

                    <td>${incidencia.titulo}</td>

                    <td>${incidencia.descripcion}</td>

                    <td>${incidencia.prioridad}</td>

                    <td>${incidencia.estado}</td>

                    <td>${incidencia.sucursal}</td>

                    <td>${incidencia.usuario}</td>

                    <td>

                        ${rol == "ADMIN" ? `

                            <button class="btn btn-success btn-sm"
                                    onclick="editarIncidencia(
                                        ${incidencia.id},
                                        '${incidencia.titulo}',
                                        '${incidencia.descripcion}',
                                        '${incidencia.prioridad}',
                                        '${incidencia.estado}',
                                        '${incidencia.sucursal}',
                                        '${incidencia.usuario}'
                                    )">

                                Editar

                            </button>

                            <button class="btn btn-danger btn-sm"
                                    onclick="eliminarIncidencia(
                                        ${incidencia.id}
                                    )">

                                Eliminar

                            </button>

                        ` : `

                            <span class="badge bg-secondary">

                                Solo lectura

                            </span>

                        `}

                    </td>

                </tr>

            `;

        });

        document.getElementById(
            "totalIncidencias"
        ).innerText = data.length;

        document.getElementById(
            "totalAlta"
        ).innerText = altas;

        document.getElementById(
            "totalMedia"
        ).innerText = medias;

        document.getElementById(
            "totalBaja"
        ).innerText = bajas;

        actualizarGrafico(
            altas,
            medias,
            bajas
        );

    }

    function actualizarGrafico(
            altas,
            medias,
            bajas){

        const ctx =
            document.getElementById(
                "graficoIncidencias"
            );

        if(grafico != null){

            grafico.destroy();

        }

        grafico = new Chart(ctx, {

            type: 'bar',

            data: {

                labels: [
                    'Alta',
                    'Media',
                    'Baja'
                ],

                datasets: [{

                    label: 'Incidencias',

                    data: [
                        altas,
                        medias,
                        bajas
                    ],

                    borderWidth: 1

                }]

            },

            options: {

                responsive: true,

                scales: {

                    y: {

                        beginAtZero: true

                    }

                }

            }

        });

    }

    async function guardarOActualizar(){

        if(rol != "ADMIN"){

            mostrarMensaje(
                "Solo el ADMIN puede modificar",
                "danger"
            );

            return;

        }

        const titulo =
            document.getElementById("titulo").value;

        const descripcion =
            document.getElementById(
                "descripcion"
            ).value;

        const estado =
            document.getElementById("estado").value;

        const sucursal =
            document.getElementById(
                "sucursal"
            ).value;

        const usuario =
            document.getElementById(
                "usuario"
            ).value;

        if(titulo.trim() == "" ||
           descripcion.trim() == "" ||
           estado.trim() == "" ||
           sucursal.trim() == "" ||
           usuario.trim() == ""){

            mostrarMensaje(
                "Todos los campos son obligatorios",
                "danger"
            );

            return;

        }

        const id =
            document.getElementById(
                "idIncidencia"
            ).value;

        const incidencia = {

            titulo: titulo,

            descripcion: descripcion,

            prioridad:
                document.getElementById(
                    "prioridad"
                ).value,

            estado: estado,

            sucursal: sucursal,

            usuario: usuario,

            fecha: "2026-05-12"

        };

        if(id == ""){

            await fetch(
                "http://localhost:8080/incidencias",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify(
                        incidencia
                    )

                });

            mostrarMensaje(
                "Incidencia registrada correctamente",
                "success"
            );

        }else{

            await fetch(
                `http://localhost:8080/incidencias/${id}`,
                {

                    method:"PUT",

                    headers:{
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify(
                        incidencia
                    )

                });

            mostrarMensaje(
                "Incidencia actualizada correctamente",
                "warning"
            );

        }

        limpiarFormulario();

        listarIncidencias();

    }

    async function eliminarIncidencia(id){

        if(rol != "ADMIN"){

            mostrarMensaje(
                "Solo el ADMIN puede eliminar",
                "danger"
            );

            return;

        }

        await fetch(
            `http://localhost:8080/incidencias/${id}`,
            {

                method:"DELETE"

            });

        mostrarMensaje(
            "Incidencia eliminada correctamente",
            "danger"
        );

        listarIncidencias();

    }

    function editarIncidencia(
            id,
            titulo,
            descripcion,
            prioridad,
            estado,
            sucursal,
            usuario){

        document.getElementById(
            "idIncidencia"
        ).value = id;

        document.getElementById(
            "titulo"
        ).value = titulo;

        document.getElementById(
            "descripcion"
        ).value = descripcion;

        document.getElementById(
            "prioridad"
        ).value = prioridad;

        document.getElementById(
            "estado"
        ).value = estado;

        document.getElementById(
            "sucursal"
        ).value = sucursal;

        document.getElementById(
            "usuario"
        ).value = usuario;

    }

    function limpiarFormulario(){

        document.getElementById(
            "idIncidencia"
        ).value = "";

        document.getElementById(
            "titulo"
        ).value = "";

        document.getElementById(
            "descripcion"
        ).value = "";

        document.getElementById(
            "estado"
        ).value = "";

        document.getElementById(
            "sucursal"
        ).value = "";

        document.getElementById(
            "usuario"
        ).value = "";

    }

    function mostrarMensaje(texto, tipo){

        document.getElementById(
            "mensaje"
        ).innerHTML = `

            <div class="alert alert-${tipo} mt-3">

                ${texto}

            </div>

        `;

        setTimeout(() => {

            document.getElementById(
                "mensaje"
            ).innerHTML = "";

        }, 3000);

    }

    function cerrarSesion(){

        localStorage.removeItem("rol");

        window.location.href = "/login";

    }

    listarIncidencias();

    function exportarPdf(){

        window.open(
            "/incidencias/pdf",
            "_blank"
        );

    }
    
</script>

</body>
</html>
