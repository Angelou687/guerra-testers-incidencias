<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Guerra Testers</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:350px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>Iniciar Sesión</h2>

    <input type="text" id="usuario" placeholder="Usuario">

    <input type="password" id="clave" placeholder="Contraseña">

    <button onclick="iniciarSesion()">
        Ingresar
    </button>

</div>

<script>

    function iniciarSesion(){

        const usuario = document.getElementById("usuario").value;
        const clave = document.getElementById("clave").value;

        if(usuario === "admin" && clave === "123"){

            localStorage.setItem("rol","ADMIN");

            window.location.href="/";

        }
        else if(usuario === "user" && clave === "123"){

            localStorage.setItem("rol","USER");

            window.location.href="/";

        }
        else{

            alert("Usuario o contraseña incorrectos");

        }

    }

</script>

</body>
</html>
