<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Historial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Historial de Incidencias
    </h1>

    <a href="/"
       class="btn btn-primary mb-4">

        Volver

    </a>

    <div class="card">

        <div class="card-body">

            <pre id="logs"></pre>

        </div>

    </div>

</div>

<script>

    async function cargarLogs(){

        const response =
            await fetch("/logs");

        const texto =
            await response.text();

        document.getElementById("logs")
                .innerText = texto;

    }

    cargarLogs();

</script>

</body>
</html>
